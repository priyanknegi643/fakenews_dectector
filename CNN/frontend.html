<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FactsChecker</title>
<style>
:root{
--bg:#080c14;--surface:#0e1420;--surface2:#141b28;
--border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.13);
--accent:#6366f1;--accent2:#818cf8;
--text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
--green:#10b981;--green-bg:rgba(16,185,129,0.08);--green-bd:rgba(16,185,129,0.25);
--red:#f43f5e;--red-bg:rgba(244,63,94,0.08);--red-bd:rgba(244,63,94,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:var(--bg);color:var(--text);
font-family:-apple-system,'Inter','Segoe UI',sans-serif;
min-height:100vh;display:flex;flex-direction:column;
align-items:center;padding:48px 16px 80px;
}
/* header */
.header{text-align:center;margin-bottom:40px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.logo-icon{
width:36px;height:36px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border-radius:10px;display:flex;align-items:center;justify-content:center;
}
.logo-text{font-size:26px;font-weight:700;letter-spacing:-0.5px;color:#fff;}
.logo-text span{color:var(--accent2);}
.tagline{font-size:13px;color:var(--muted);letter-spacing:0.3px;}
/* card */
.card{
width:100%;max-width:680px;
background:var(--surface);border:1px solid var(--border);
border-radius:20px;padding:28px;
}
.input-label{
font-size:11px;font-weight:600;letter-spacing:0.8px;
text-transform:uppercase;color:var(--muted);margin-bottom:10px;
}
.textarea-wrap{
position:relative;border-radius:12px;
border:1px solid var(--border);background:var(--surface2);
transition:border-color 0.2s;
}
.textarea-wrap:focus-within{
border-color:rgba(99,102,241,0.5);
box-shadow:0 0 0 3px rgba(99,102,241,0.08);
}
textarea{
width:100%;height:200px;background:transparent;
border:none;outline:none;padding:16px;
color:var(--text);font-size:14px;line-height:1.6;
resize:none;font-family:inherit;
}
textarea::placeholder{color:var(--muted);}
.char-count{position:absolute;bottom:10px;right:14px;font-size:11px;color:var(--muted);}
/* samples */
.samples{margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;}
.sample-pill{
font-size:12px;padding:5px 12px;border-radius:99px;
border:1px solid var(--border);color:var(--muted2);
cursor:pointer;background:transparent;font-family:inherit;transition:all 0.15s;
}
.sample-pill:hover{border-color:var(--border-h);color:var(--text);}
/* buttons */
.btn-row{display:flex;gap:10px;margin-top:14px;}
.btn-clear{
padding:0 18px;height:46px;border-radius:10px;
border:1px solid var(--border);background:transparent;
color:var(--muted2);font-size:13px;font-weight:500;
cursor:pointer;transition:all 0.2s;font-family:inherit;white-space:nowrap;
}
.btn-clear:hover{border-color:var(--border-h);color:var(--text);}
.btn-analyze{
flex:1;height:46px;border-radius:10px;border:none;
background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 100%);
color:#fff;font-size:14px;font-weight:600;
cursor:pointer;transition:all 0.2s;font-family:inherit;
display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:0.2px;
}
.btn-analyze:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,0.25);}
.btn-analyze:active{transform:translateY(0);}
.btn-analyze:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
/* divider */
.divider{height:1px;background:var(--border);margin:24px 0;}
.spinner{
width:18px;height:18px;flex-shrink:0;
border:2px solid var(--border-h);border-top-color:var(--accent);
border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-row{display:flex;align-items:center;gap:12px;padding:4px 0;}
.loading-text{font-size:14px;color:var(--muted2);}
/* result */
.result-state{display:none;}
.verdict-row{display:flex;align-items:center;gap:16px;margin-bottom:16px;}
.verdict-badge{
display:flex;align-items:center;gap:8px;padding:8px 18px;
border-radius:100px;font-size:15px;font-weight:700;letter-spacing:0.5px;
}
.verdict-badge.real{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);}
.verdict-badge.fake{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);}
.verdict-dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s ease infinite;}
.verdict-dot.real{background:var(--green);}
.verdict-dot.fake{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.conf-label{font-size:12px;color:var(--muted);margin-left:auto;}
.conf-value{color:var(--text);font-weight:600;}
.bar-wrap{height:6px;border-radius:99px;background:var(--surface2);overflow:hidden;border:1px solid var(--border);}
.bar-fill{height:100%;border-radius:99px;width:0%;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
.bar-fill.real{background:linear-gradient(90deg,#10b981,#34d399);}
.bar-fill.fake{background:linear-gradient(90deg,#f43f5e,#fb7185);}
</style>
</head>
<body>

<div class="header">
<div class="logo-row">
<div class="logo-icon">
<svg width="20" height="20" viewBox="0 0 20 20" fill="none">
<path d="M10 2L3 7V18H8V13H12V18H17V7L10 2Z" stroke="white" stroke-width="1.5"/>
<circle cx="10" cy="10" r="2" fill="white"/>
</svg>
</div>
<div class="logo-text"><span>Facts</span>Checker</div>
</div>
<div class="tagline">AI-powered news verification</div>
</div>

<div class="card">
<div class="input-label">Paste Article</div>
<div class="textarea-wrap">
<textarea id="article" placeholder="Paste text..." oninput="updateChar()"></textarea>
<div class="char-count" id="charCount">0 chars</div>
</div>

<div class="btn-row">
<button class="btn-clear" onclick="clearAll()">Clear</button>
<button class="btn-analyze" id="analyzeBtn" onclick="analyzeArticle()">Analyze</button>
</div>

<div id="analyzeLoadingWrap" style="display:none">
<div class="divider"></div>
<div class="loading-row">
<div class="spinner"></div>
<div class="loading-text">Analyzing...</div>
</div>
</div>

<div id="resultState" class="result-state">
<div class="divider"></div>
<div class="verdict-row">
<div class="verdict-badge" id="verdictBadge">
<div class="verdict-dot" id="verdictDot"></div>
<span id="verdictLabel"></span>
</div>
<div class="conf-label">Confidence: <span id="confValue"></span></div>
</div>
<div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>
</div>
</div>

<script>
// config
const FLASK_BASE="http://127.0.0.1:5000";
// update chars
function updateChar(){
const n=document.getElementById("article").value.length;
document.getElementById("charCount").textContent=n+" chars";
}
// clear
function clearAll(){
document.getElementById("article").value="";
updateChar();
document.getElementById("resultState").style.display="none";
}
// analyze
async function analyzeArticle(){
const text=document.getElementById("article").value.trim();
if(!text)return alert("Enter text");
const res=await fetch(FLASK_BASE+"/predict",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text})});
const data=await res.json();
renderResult(data);
}
// render
function renderResult(data){
const isReal=data.label==="REAL";
const conf=(data.confidence*100).toFixed(1);
document.getElementById("verdictLabel").textContent=isReal?"Real":"Fake";
document.getElementById("confValue").textContent=conf+"%";
const fill=document.getElementById("barFill");
fill.style.width=conf+"%";
document.getElementById("resultState").style.display="block";
}
</script>
</body>
</html>
