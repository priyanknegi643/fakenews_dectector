<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FactsChecker</title>

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --accent: #6366f1;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --green: #22c55e;
  --red: #ef4444;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: var(--text);
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 90%;
  max-width: 700px;
  background: var(--card);
  border-radius: 16px;
  padding: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  font-size: 32px;
  letter-spacing: 1px;
}

h1 span {
  color: var(--accent);
}

textarea {
  width: 100%;
  height: 200px;
  background: #020617;
  border: 1px solid #1f2937;
  border-radius: 10px;
  padding: 15px;
  color: var(--text);
  font-size: 14px;
  resize: none;
  outline: none;
  transition: 0.2s;
}

textarea:focus {
  border-color: var(--accent);
}

button {
  width: 100%;
  margin-top: 15px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

.result-box {
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  background: #020617;
  border: 1px solid #1f2937;
  text-align: center;
  display: none;
}

.label {
  font-size: 28px;
  font-weight: bold;
}

.confidence {
  margin-top: 8px;
  font-size: 14px;
  color: var(--muted);
}

.bar {
  margin-top: 15px;
  height: 8px;
  border-radius: 6px;
  background: #1f2937;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  transition: width 0.6s ease;
}

.loading {
  text-align: center;
  margin-top: 15px;
  color: var(--muted);
  display: none;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">
  <h1><span>Facts</span>Checker</h1>

  <textarea id="article" placeholder="Paste news article here..."></textarea>

  <button onclick="analyzeArticle()">Analyze Article</button>

  <div class="loading" id="loading">Analyzing...</div>

  <div class="result-box" id="resultBox">
    <div class="label" id="label"></div>
    <div class="confidence" id="confidence"></div>
    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>
  </div>

  <div class="footer">
    AI-powered Fake News Detection
  </div>
</div>

<script>
async function analyzeArticle() {
  const text = document.getElementById("article").value;

  if (!text.trim()) {
    alert("Enter text first");
    return;
  }

  const loading = document.getElementById("loading");
  const resultBox = document.getElementById("resultBox");

  loading.style.display = "block";
  resultBox.style.display = "none";

  try {
    const response = await fetch("http://127.0.0.1:5000/predict", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    loading.style.display = "none";

    if (data.error) {
      alert(data.error);
      return;
    }

    const label = data.label;
    const confidence = (data.confidence * 100).toFixed(2);

    const labelEl = document.getElementById("label");
    const confEl = document.getElementById("confidence");
    const fill = document.getElementById("fill");

    labelEl.innerText = label;
    confEl.innerText = "Confidence: " + confidence + "%";

    if (label === "REAL") {
      labelEl.style.color = "#22c55e";
      fill.style.background = "#22c55e";
    } else {
      labelEl.style.color = "#ef4444";
      fill.style.background = "#ef4444";
    }

    setTimeout(() => {
      fill.style.width = confidence + "%";
    }, 100);

    resultBox.style.display = "block";

  } catch (err) {
    loading.style.display = "none";
    alert("Backend not reachable");
    console.error(err);
  }
}
</script>

</body>
</html>
